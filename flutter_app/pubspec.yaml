name: indic_slm
description: Privacy-First Indic Chat Summarizer — on-device SLM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  file_picker: ^8.0.3
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
